name: Publish NuGet Package

on:
  push:
    branches:
      - Develop
      - main
    paths:
      - 'src/AdAgent/AdAgent.Shared/AdAgent.csproj'
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - project_path: src/AdAgent/AdAgent.Shared/AdAgent.Shared.csproj
            package_id: AdAgent.Shared

    env:
      PROJECT_PATH: ${{ matrix.project_path }}
      PACKAGE_ID: ${{ matrix.package_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Configure GitHub NuGet source
        run: >
          dotnet nuget add source
          "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
          --name github
          --username ${{ github.actor }}
          --password ${{ secrets.GITHUB_TOKEN }}
          --store-password-in-clear-text

      - name: Resolve version from csproj
        id: version
        run: |
          # Read the <Version> element from the project file.
          version=$(grep -oPm1 '(?<=<Version>)[^<]+' "${PROJECT_PATH}")
          if [ -z "$version" ]; then
            echo "Could not read <Version> from ${PROJECT_PATH}."
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $version"

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore

      - name: Check if version already published
        id: check
        run: |
          package_id_lower=$(echo "${PACKAGE_ID}" | tr '[:upper:]' '[:lower:]')
          # Query the GitHub Packages NuGet feed (requires auth) for existing versions of this package.
          versions=$(curl -s -u "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
            "https://nuget.pkg.github.com/${{ github.repository_owner }}/${package_id_lower}/index.json" || true)
          if echo "$versions" | grep -q "\"${{ steps.version.outputs.version }}\""; then
            echo "Version ${{ steps.version.outputs.version }} already exists in GitHub Packages. Skipping publish."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "Version ${{ steps.version.outputs.version }} not found in GitHub Packages. Will publish."
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Pack
        if: steps.check.outputs.should_publish == 'true'
        run: dotnet pack ${{ env.PROJECT_PATH }} --configuration Release --no-build --output ./artifacts

      - name: Push to GitHub Packages
        if: steps.check.outputs.should_publish == 'true'
        run: dotnet nuget push "./artifacts/*.nupkg" --source github --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate
